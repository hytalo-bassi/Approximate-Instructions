name: Build Docker Images

on:
  push:
    branches: [main]
    paths:
      - "docker/prod/**"
      - "patches/**"
      - "configs/**"
      - "Approx_Instructions/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-riscv-prod:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    outputs:
      sha_tag: sha-${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push riscv-prod
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/prod/Dockerfile.base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/riscv-prod:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/riscv-prod:edge
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BUILD_JOBS=2
          cache-from: type=gha,scope=riscv-prod
          cache-to: type=gha,scope=riscv-prod,mode=max

      - name: Smoke test riscv-prod
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/riscv-prod:sha-${{ github.sha }} \
            riscv64-unknown-linux-musl-gcc --version

  build-gem5-base:
    runs-on: ubuntu-latest
    needs: build-riscv-prod
    permissions:
      contents: read
      packages: write
      actions: write
    outputs:
      sha_tag: sha-${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gem5-base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/prod/Dockerfile.gem5-base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gem5-base:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gem5-base:edge
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            RISCV_PROD_TAG=sha-${{ github.sha }}
          cache-from: type=gha,scope=gem5-base
          cache-to: type=gha,scope=gem5-base,mode=max

      - name: Smoke test gem5-base
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gem5-base:sha-${{ github.sha }} \
            bash -c "test -f /opt/gem5/SConstruct && echo 'gem5 source present'"

  build-gem5-full:
    runs-on: ubuntu-latest
    needs: [build-gem5-base, build-riscv-prod]
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gem5-full
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/prod/Dockerfile.gem5
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gem5-full:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gem5-full:edge
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BUILD_JOBS=2
            RISCV_PROD_TAG=sha-${{ github.sha }}
            GEM5_BASE_TAG=sha-${{ github.sha }}
          cache-from: type=gha,scope=gem5-full
          cache-to: type=gha,scope=gem5-full,mode=max

      - name: Smoke test gem5-full
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gem5-full:sha-${{ github.sha }} \
            gem5.fast --build-info